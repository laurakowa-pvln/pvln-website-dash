name: Update dashboard data

on:
  schedule:
    - cron: "0 8 * * 1"    # Mondays at 3am EST (8am UTC) (after weekend data lands)
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests google-auth

      - name: Fetch data
        run: python update_dashboard.py
        env:
          GA4_SERVICE_ACCOUNT_JSON: ${{ secrets.GA4_SERVICE_ACCOUNT_JSON }}
          HUBSPOT_PAK: ${{ secrets.HUBSPOT_PAK }}

      - name: Commit and push if data changed
        run: |
          git config user.name  "dashboard-bot"
          git config user.email "bot@joinpavilion.com"
          git add data.json
          git diff --staged --quiet && echo "No changes." || (
            git commit -m "Data refresh $(date -u '+%Y-%m-%d')" &&
            git push
          )
